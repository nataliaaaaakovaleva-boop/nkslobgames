<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Звёздный счёт: Миссия Галактика</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Orbitron:wght@700;900&display=swap');

  :root {
    --bg: #0d0d2b;
    --bg2: #1a1a4e;
    --blue: #6b7fd4;
    --blue-light: #9baee8;
    --amber: #f5a623;
    --amber-light: #ffd166;
    --green: #4ecb71;
    --red: #e05c7a;
    --white: #e8eaf6;
    --gray: #8892c0;
    --purple: #a855f7;
    --card-bg: rgba(26,26,78,0.85);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--white);
    overflow: hidden;
    user-select: none;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ===== SCREENS ===== */
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    padding: 20px;
    text-align: center;
  }
  .screen.active { display: flex; }

  /* ===== START SCREEN ===== */
  .logo-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(24px, 5vw, 52px);
    font-weight: 900;
    color: var(--amber);
    text-shadow: 0 0 30px rgba(245,166,35,0.6), 0 0 60px rgba(245,166,35,0.3);
    letter-spacing: 2px;
    line-height: 1.2;
    margin-bottom: 8px;
    animation: pulseGlow 2.5s ease-in-out infinite;
  }
  .logo-sub {
    font-size: clamp(14px, 2.5vw, 20px);
    color: var(--blue-light);
    margin-bottom: 30px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  @keyframes pulseGlow {
    0%,100% { text-shadow: 0 0 30px rgba(245,166,35,0.6); }
    50% { text-shadow: 0 0 50px rgba(245,166,35,0.9), 0 0 90px rgba(245,166,35,0.4); }
  }

  .astrik {
    width: clamp(80px,15vw,130px);
    height: clamp(80px,15vw,130px);
    margin-bottom: 20px;
    animation: bobFloat 3s ease-in-out infinite;
  }
  @keyframes bobFloat {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
  }

  .mission-text {
    background: var(--card-bg);
    border: 1px solid rgba(107,127,212,0.4);
    border-radius: 18px;
    padding: 16px 28px;
    font-size: clamp(14px,2.5vw,18px);
    color: var(--white);
    max-width: 500px;
    margin-bottom: 30px;
    line-height: 1.5;
  }
  .mission-text strong { color: var(--amber); }

  /* ===== BUTTONS ===== */
  .btn {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(16px,3vw,22px);
    font-weight: 800;
    padding: 14px 40px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
  }
  .btn:active { transform: scale(0.95); }
  .btn-primary {
    background: linear-gradient(135deg, var(--amber), #e8920a);
    color: #1a1a00;
    box-shadow: 0 4px 20px rgba(245,166,35,0.5);
  }
  .btn-primary:hover { box-shadow: 0 6px 30px rgba(245,166,35,0.7); transform: translateY(-2px); }
  .btn-blue {
    background: linear-gradient(135deg, var(--blue), #4a5db0);
    color: var(--white);
    box-shadow: 0 4px 20px rgba(107,127,212,0.4);
  }
  .btn-small {
    font-size: clamp(13px,2vw,17px);
    padding: 10px 24px;
  }

  /* ===== HUD ===== */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: rgba(13,13,43,0.92);
    border-bottom: 1px solid rgba(107,127,212,0.3);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 100;
    backdrop-filter: blur(6px);
    display: none;
  }
  .hud-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(11px,2vw,15px);
    color: var(--amber);
    font-weight: 700;
  }
  .hud-stars {
    display: flex;
    gap: 6px;
  }
  .hud-star {
    font-size: 20px;
    filter: grayscale(1) opacity(0.4);
    transition: all 0.4s;
  }
  .hud-star.lit {
    filter: none;
    animation: starPop 0.4s ease-out;
  }
  @keyframes starPop {
    0% { transform: scale(0); }
    70% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
  .hud-score {
    font-weight: 800;
    font-size: clamp(13px,2vw,17px);
    color: var(--blue-light);
  }
  #sound-btn {
    background: none;
    border: 1px solid rgba(107,127,212,0.4);
    border-radius: 8px;
    color: var(--gray);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 10px;
    line-height: 1;
  }

  /* ===== GALAXY MAP ===== */
  #galaxy-map {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 70px;
    background: rgba(13,13,43,0.85);
    border-top: 1px solid rgba(107,127,212,0.25);
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 0 16px;
    z-index: 100;
  }
  .map-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(107,127,212,0.2);
    border: 2px solid rgba(107,127,212,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    color: var(--gray);
    transition: all 0.4s;
  }
  .map-dot.done {
    background: rgba(245,166,35,0.2);
    border-color: var(--amber);
    color: var(--amber);
  }
  .map-dot.current {
    background: rgba(107,127,212,0.4);
    border-color: var(--blue-light);
    color: var(--white);
    animation: mapPulse 1.5s ease-in-out infinite;
  }
  @keyframes mapPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(107,127,212,0.5); }
    50% { box-shadow: 0 0 0 6px rgba(107,127,212,0); }
  }
  .map-line {
    width: clamp(16px,3vw,36px);
    height: 2px;
    background: rgba(107,127,212,0.25);
    transition: background 0.4s;
  }
  .map-line.done { background: var(--amber); }

  /* ===== GAME SCREEN ===== */
  #game-screen {
    padding-top: 70px;
    padding-bottom: 80px;
    justify-content: flex-start;
  }

  .game-card {
    background: var(--card-bg);
    border: 1px solid rgba(107,127,212,0.35);
    border-radius: 24px;
    padding: clamp(18px,4vw,36px);
    width: 100%;
    max-width: 560px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  .mini-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(13px,2.5vw,17px);
    color: var(--blue-light);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .mini-desc {
    font-size: clamp(13px,2vw,15px);
    color: var(--gray);
    margin-bottom: 18px;
  }

  .big-example {
    font-family: 'Orbitron', monospace;
    font-size: clamp(32px,7vw,60px);
    font-weight: 900;
    color: var(--white);
    text-align: center;
    margin: 16px 0;
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(107,127,212,0.4);
  }

  /* TIMER BAR */
  .timer-wrap {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    margin-bottom: 18px;
    overflow: hidden;
  }
  .timer-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--amber));
    border-radius: 4px;
    transition: width 0.1s linear, background 0.3s;
  }

  /* CHOICES (game 1) */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 8px;
  }
  .choice-btn {
    font-family: 'Orbitron', monospace;
    font-size: clamp(20px,4vw,32px);
    font-weight: 900;
    padding: 18px 10px;
    background: rgba(107,127,212,0.15);
    border: 2px solid rgba(107,127,212,0.4);
    border-radius: 16px;
    color: var(--white);
    cursor: pointer;
    transition: all 0.2s;
  }
  .choice-btn:hover { background: rgba(107,127,212,0.35); border-color: var(--blue-light); transform: scale(1.03); }
  .choice-btn.correct { background: rgba(78,203,113,0.3); border-color: var(--green); color: var(--green); }
  .choice-btn.wrong { background: rgba(224,92,122,0.3); border-color: var(--red); color: var(--red); }

  /* NUMPAD */
  .answer-display {
    font-family: 'Orbitron', monospace;
    font-size: clamp(28px,6vw,48px);
    font-weight: 900;
    text-align: center;
    padding: 16px;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(107,127,212,0.4);
    border-radius: 16px;
    margin-bottom: 14px;
    min-height: 74px;
    color: var(--amber-light);
    letter-spacing: 4px;
  }
  .numpad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .numpad-btn {
    font-family: 'Orbitron', monospace;
    font-size: clamp(16px,3vw,22px);
    font-weight: 700;
    padding: clamp(12px,2.5vw,18px) 6px;
    background: rgba(107,127,212,0.15);
    border: 1px solid rgba(107,127,212,0.35);
    border-radius: 12px;
    color: var(--white);
    cursor: pointer;
    transition: all 0.15s;
  }
  .numpad-btn:active { transform: scale(0.92); background: rgba(107,127,212,0.4); }
  .numpad-btn.del { background: rgba(224,92,122,0.15); border-color: rgba(224,92,122,0.35); color: var(--red); }
  .numpad-btn.ok-btn { background: rgba(78,203,113,0.2); border-color: rgba(78,203,113,0.5); color: var(--green); grid-column: span 2; font-size: clamp(14px,2.5vw,18px); letter-spacing: 1px; }

  /* DRAG SORT (game 3) */
  .sort-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 10px;
  }
  .sort-planet {
    background: rgba(107,127,212,0.1);
    border: 2px dashed rgba(107,127,212,0.4);
    border-radius: 16px;
    padding: 12px;
    min-height: 80px;
    text-align: center;
    transition: all 0.2s;
  }
  .sort-planet.over { border-color: var(--amber); background: rgba(245,166,35,0.1); }
  .sort-planet.correct { border-color: var(--green); border-style: solid; background: rgba(78,203,113,0.1); }
  .sort-planet.wrong { border-color: var(--red); border-style: solid; background: rgba(224,92,122,0.1); }
  .planet-answer {
    font-family: 'Orbitron', monospace;
    font-size: clamp(20px,4vw,30px);
    font-weight: 900;
    color: var(--amber);
    display: block;
    margin-bottom: 6px;
  }
  .example-chip {
    display: inline-block;
    background: rgba(107,127,212,0.25);
    border: 1px solid rgba(107,127,212,0.5);
    border-radius: 10px;
    padding: 6px 12px;
    font-family: 'Orbitron', monospace;
    font-size: clamp(12px,2vw,16px);
    font-weight: 700;
    color: var(--white);
    cursor: grab;
    margin: 3px;
    transition: all 0.2s;
    touch-action: none;
  }
  .example-chip:active { cursor: grabbing; transform: scale(1.05); }
  .draggable-area {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin: 12px 0;
    min-height: 44px;
  }

  /* SIGN BUILDER (game 4) */
  .sign-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 16px 0;
    flex-wrap: wrap;
  }
  .sign-num {
    font-family: 'Orbitron', monospace;
    font-size: clamp(26px,5vw,42px);
    font-weight: 900;
    color: var(--white);
    min-width: 48px;
    text-align: center;
  }
  .sign-slot {
    font-family: 'Orbitron', monospace;
    font-size: clamp(24px,4vw,36px);
    font-weight: 900;
    width: clamp(50px,8vw,70px);
    height: clamp(50px,8vw,70px);
    border: 2px solid rgba(245,166,35,0.5);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--amber);
    background: rgba(245,166,35,0.08);
  }
  .sign-slot:hover { background: rgba(245,166,35,0.2); }
  .sign-slot.correct { border-color: var(--green); color: var(--green); }
  .sign-slot.wrong { border-color: var(--red); color: var(--red); animation: shake 0.3s; }
  .sign-equals {
    font-family: 'Orbitron', monospace;
    font-size: clamp(24px,4vw,36px);
    color: var(--gray);
  }
  .sign-result {
    font-family: 'Orbitron', monospace;
    font-size: clamp(26px,5vw,42px);
    font-weight: 900;
    color: var(--amber-light);
  }

  /* FIND ERROR (game 5) */
  .robot-solution {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(107,127,212,0.3);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .robot-line {
    font-family: 'Orbitron', monospace;
    font-size: clamp(16px,3vw,22px);
    font-weight: 700;
    color: var(--white);
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .robot-line:hover { background: rgba(107,127,212,0.2); }
  .robot-line.selected-error { background: rgba(224,92,122,0.2); border: 1px solid var(--red); }
  .robot-line.correct-error { background: rgba(78,203,113,0.2); border: 1px solid var(--green); }
  .robot-line.wrong-error { background: rgba(224,92,122,0.3); animation: shake 0.3s; }

  /* FINAL SPRINT (game 6) */
  .progress-dots {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .pdot {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(107,127,212,0.3);
    transition: all 0.3s;
  }
  .pdot.ok { background: var(--green); border-color: var(--green); }
  .pdot.fail { background: var(--red); border-color: var(--red); }
  .pdot.cur { border-color: var(--amber); animation: mapPulse 1s infinite; }

  /* FEEDBACK */
  .feedback-box {
    border-radius: 16px;
    padding: 14px 18px;
    margin-top: 14px;
    font-size: clamp(14px,2.5vw,17px);
    font-weight: 700;
    display: none;
    line-height: 1.4;
  }
  .feedback-box.show { display: block; }
  .feedback-box.good { background: rgba(78,203,113,0.2); border: 1px solid var(--green); color: var(--green); }
  .feedback-box.bad { background: rgba(224,92,122,0.15); border: 1px solid var(--red); color: #ffb3c2; }

  /* HINT */
  .hint-box {
    background: rgba(168,85,247,0.15);
    border: 1px solid rgba(168,85,247,0.4);
    border-radius: 12px;
    padding: 10px 16px;
    font-size: clamp(13px,2vw,15px);
    color: #d8b4fe;
    margin-top: 10px;
    display: none;
  }
  .hint-box.show { display: block; }

  /* TRANSITION SCREEN */
  #transition-screen {
    z-index: 200;
  }
  .crystal {
    font-size: clamp(50px,12vw,100px);
    animation: crystalSpin 0.6s ease-out;
    margin-bottom: 16px;
  }
  @keyframes crystalSpin {
    0% { transform: scale(0) rotate(-180deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .transition-score {
    font-family: 'Orbitron', monospace;
    font-size: clamp(14px,2.5vw,18px);
    color: var(--blue-light);
    margin-bottom: 20px;
  }

  /* REPORT SCREEN */
  .report-card {
    background: var(--card-bg);
    border: 1px solid rgba(107,127,212,0.35);
    border-radius: 24px;
    padding: clamp(16px,3vw,30px);
    width: 100%;
    max-width: 560px;
    backdrop-filter: blur(10px);
    overflow-y: auto;
    max-height: 70vh;
  }
  .report-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(16px,3vw,22px);
    color: var(--amber);
    margin-bottom: 16px;
    font-weight: 900;
  }
  .report-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-radius: 10px;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.04);
    font-size: clamp(13px,2vw,15px);
  }
  .report-row .name { color: var(--blue-light); font-weight: 700; }
  .report-row .val { font-family: 'Orbitron', monospace; font-weight: 700; }
  .report-row .val.green { color: var(--green); }
  .report-row .val.yellow { color: var(--amber); }
  .report-row .val.red { color: var(--red); }
  .report-total {
    margin-top: 14px;
    padding: 14px;
    background: rgba(245,166,35,0.1);
    border: 1px solid rgba(245,166,35,0.3);
    border-radius: 14px;
    text-align: center;
    font-size: clamp(14px,2.5vw,18px);
    font-weight: 800;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .shake { animation: shake 0.35s ease-out; }

  /* Particles */
  .particle {
    position: fixed;
    pointer-events: none;
    font-size: 20px;
    z-index: 300;
    animation: particleFly 0.9s ease-out forwards;
  }
  @keyframes particleFly {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<div id="hud">
  <span class="hud-title">⭐ ЗВЁЗДНЫЙ СЧЁТ</span>
  <div class="hud-stars" id="hudStars"></div>
  <span class="hud-score" id="hudScore">0 очков</span>
  <button id="sound-btn" onclick="toggleSound()">🔊</button>
</div>

<div id="galaxy-map">
  <div id="mapDots"></div>
</div>

<div id="app">

  <!-- START SCREEN -->
  <div class="screen active" id="start-screen">
    <svg class="astrik" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <circle cx="60" cy="60" r="52" fill="#1a1a6e" stroke="#6b7fd4" stroke-width="3"/>
      <circle cx="60" cy="60" r="44" fill="#1a1a4e"/>
      <circle cx="42" cy="50" r="16" fill="#e8eaf6" stroke="#6b7fd4" stroke-width="2"/>
      <circle cx="78" cy="50" r="16" fill="#e8eaf6" stroke="#6b7fd4" stroke-width="2"/>
      <circle cx="44" cy="52" r="8" fill="#3a3a8e"/>
      <circle cx="80" cy="52" r="8" fill="#3a3a8e"/>
      <circle cx="46" cy="50" r="3" fill="white"/>
      <circle cx="82" cy="50" r="3" fill="white"/>
      <path d="M 44 74 Q 60 86 76 74" stroke="#f5a623" stroke-width="3" fill="none" stroke-linecap="round"/>
      <rect x="26" y="90" width="16" height="20" rx="5" fill="#6b7fd4"/>
      <rect x="78" y="90" width="16" height="20" rx="5" fill="#6b7fd4"/>
      <circle cx="34" cy="90" r="5" fill="#f5a623"/>
      <circle cx="86" cy="90" r="5" fill="#f5a623"/>
      <rect x="48" y="10" width="24" height="16" rx="4" fill="#f5a623" opacity="0.8"/>
      <polygon points="55,10 65,10 60,2" fill="#f5a623"/>
    </svg>
    <div class="logo-title">ЗВЁЗДНЫЙ СЧЁТ</div>
    <div class="logo-sub">Миссия Галактика</div>
    <div class="mission-text">
      Привет, пилот! 🚀<br>
      Астрик потерял <strong>6 звёздных кристаллов</strong> по всей галактике.<br>
      Реши примеры — спаси кристаллы!
    </div>
    <button class="btn btn-primary" onclick="startGame()">🚀 ЛЕТЕТЬ!</button>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="game-screen">
    <div class="game-card" id="gameCard">
      <!-- Content injected by JS -->
    </div>
  </div>

  <!-- TRANSITION SCREEN -->
  <div class="screen" id="transition-screen">
    <div class="crystal" id="crystalEmoji">💎</div>
    <div class="logo-title" style="font-size:clamp(20px,4vw,36px)" id="transTitle">Кристалл найден!</div>
    <div class="transition-score" id="transSub">Отличная работа!</div>
    <button class="btn btn-primary" id="transBtn" onclick="nextMini()">Дальше →</button>
  </div>

  <!-- REPORT SCREEN -->
  <div class="screen" id="report-screen">
    <div class="report-card" id="reportCard">
      <div class="report-title">📊 Отчёт для учителя</div>
      <div id="reportContent"></div>
    </div>
  </div>

</div>

<script>
// ===========================
// STARS BACKGROUND
// ===========================
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
let stars = [];
let nebula = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function initStars() {
  stars = [];
  for (let i = 0; i < 180; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.8 + 0.3,
      alpha: Math.random(),
      speed: Math.random() * 0.008 + 0.002,
      twinkle: Math.random() * Math.PI * 2
    });
  }
  nebula = [];
  const colors = ['rgba(107,127,212,', 'rgba(168,85,247,', 'rgba(78,180,212,'];
  for (let i = 0; i < 5; i++) {
    nebula.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: 80 + Math.random() * 140,
      color: colors[Math.floor(Math.random() * colors.length)],
      alpha: 0.03 + Math.random() * 0.04
    });
  }
}

let animT = 0;
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  nebula.forEach(n => {
    const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    g.addColorStop(0, n.color + n.alpha + ')');
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fill();
  });
  stars.forEach(s => {
    s.twinkle += s.speed;
    const a = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(s.twinkle));
    ctx.fillStyle = `rgba(232,234,246,${a})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  animT++;
  requestAnimationFrame(drawStars);
}

resizeCanvas();
initStars();
drawStars();
window.addEventListener('resize', () => { resizeCanvas(); initStars(); });

// ===========================
// GAME STATE
// ===========================
let soundOn = true;
let totalScore = 0;
let currentMini = 0;
let miniStats = []; // {correct, total, hints, time}
let miniStartTime = 0;

const MINI_CONFIGS = [
  { id: 1, name: '🚀 Запуск ракеты', desc: 'Выбери правильный ответ! У тебя 15 секунд ⏱', emoji: '💜' },
  { id: 2, name: '☄️ Астероидный пояс', desc: 'Введи ответ и нажми ОК 🔢', emoji: '🔵' },
  { id: 3, name: '🪐 Сортировка планет', desc: 'Перетащи пример к нужной планете', emoji: '💛' },
  { id: 4, name: '🌀 Чёрная дыра', desc: 'Нажми знак + или −, чтобы получить нужный результат', emoji: '💚' },
  { id: 5, name: '👾 Сигнал пришельца', desc: 'Робот всегда делает одну ошибку! Найди её и нажми на строку 🔍', emoji: '🧡' },
  { id: 6, name: '🛸 Финальная стыковка', desc: '10 примеров без подсказок. Решай быстро!', emoji: '💎' },
];

// ===========================
// AUDIO (simple beeps via Web Audio)
// ===========================
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, dur, type='sine', vol=0.15) {
  if (!soundOn) return;
  try {
    const a = getAudio();
    const o = a.createOscillator();
    const g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.start(); o.stop(a.currentTime + dur);
  } catch(e) {}
}
function playCorrect() { beep(523,0.1); setTimeout(()=>beep(659,0.1),100); setTimeout(()=>beep(784,0.15),200); }
function playWrong() { beep(220,0.2,'sawtooth',0.1); }
function playClick() { beep(400,0.05,'square',0.08); }
function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('sound-btn').textContent = soundOn ? '🔊' : '🔇';
}

// ===========================
// PARTICLES
// ===========================
function spawnParticles(x, y, ok) {
  const emojis = ok ? ['⭐','✨','💫','🌟'] : ['💥','😅'];
  for (let i = 0; i < 6; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const dx = (Math.random()-0.5)*160;
    const dy = -(60 + Math.random()*100);
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.setProperty('--dx', dx + 'px');
    el.style.setProperty('--dy', dy + 'px');
    el.style.animationDuration = (0.7 + Math.random()*0.4) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1100);
  }
}

// ===========================
// START / INIT
// ===========================
function startGame() {
  playClick();
  currentMini = 0;
  totalScore = 0;
  miniStats = [];
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('galaxy-map').style.display = 'flex';
  buildHud();
  buildMap();
  showScreen('game-screen');
  launchMini(currentMini);
}

function buildHud() {
  const wrap = document.getElementById('hudStars');
  wrap.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const s = document.createElement('div');
    s.className = 'hud-star';
    s.textContent = '⭐';
    s.id = 'hstar' + i;
    wrap.appendChild(s);
  }
}

function lightStar(i) {
  const s = document.getElementById('hstar' + i);
  if (s) s.classList.add('lit');
}

function buildMap() {
  const wrap = document.getElementById('mapDots');
  wrap.innerHTML = '';
  MINI_CONFIGS.forEach((m, i) => {
    if (i > 0) {
      const line = document.createElement('div');
      line.className = 'map-line';
      line.id = 'mline' + i;
      wrap.appendChild(line);
    }
    const dot = document.createElement('div');
    dot.className = 'map-dot' + (i === 0 ? ' current' : '');
    dot.id = 'mdot' + i;
    dot.textContent = m.id;
    wrap.appendChild(dot);
  });
}

function updateMap(idx) {
  for (let i = 0; i < 6; i++) {
    const d = document.getElementById('mdot' + i);
    d.className = 'map-dot';
    if (i < idx) { d.classList.add('done'); d.textContent = '✓'; }
    else if (i === idx) d.classList.add('current');
    if (i > 0 && i <= idx) {
      const l = document.getElementById('mline' + i);
      if (l) l.classList.add('done');
    }
  }
}

function updateScore() {
  document.getElementById('hudScore').textContent = totalScore + ' очков';
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===========================
// MINI-GAME ROUTER
// ===========================
function launchMini(idx) {
  miniStartTime = Date.now();
  updateMap(idx);
  const fns = [launchMini1, launchMini2, launchMini3, launchMini4, launchMini5, launchMini6];
  fns[idx]();
}

function finishMini(correct, total, hints) {
  const elapsed = Math.round((Date.now() - miniStartTime) / 1000);
  miniStats.push({ name: MINI_CONFIGS[currentMini].name, correct, total, hints, time: elapsed });
  lightStar(currentMini);
  updateScore();

  const pct = Math.round((correct / total) * 100);
  const emoji = MINI_CONFIGS[currentMini].emoji;
  document.getElementById('crystalEmoji').textContent = emoji;
  document.getElementById('transTitle').textContent = pct >= 70 ? 'Кристалл найден! ' + emoji : 'Кристалл почти найден ' + emoji;
  const msgs = pct >= 70
    ? ['Отлично, пилот! 🌟', 'Космос гордится тобой! 🚀', 'Супер! Лети дальше! 💫']
    : ['Неплохо, пилот! Продолжай!', 'Ошибки — это опыт! 💪', 'Дальше будет лучше!'];
  document.getElementById('transSub').textContent = `${correct} из ${total} правильно (${pct}%) • ${elapsed} сек`;
  document.getElementById('transBtn').textContent = currentMini < 5 ? 'Дальше →' : '📊 Итоги';

  showScreen('transition-screen');
  spawnParticles(window.innerWidth / 2, window.innerHeight / 2, pct >= 70);
  if (pct >= 70) playCorrect(); else playWrong();
}

function nextMini() {
  playClick();
  currentMini++;
  if (currentMini >= 6) {
    showReport();
  } else {
    showScreen('game-screen');
    launchMini(currentMini);
  }
}

// ===========================
// HELPERS
// ===========================
function randInt(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }

function generateExamples(count, type) {
  // type: 'add','sub','mixed'
  const examples = [];
  for (let i = 0; i < count; i++) {
    let a, b, op, ans;
    if (type === 'add' || (type === 'mixed' && Math.random() < 0.5)) {
      a = randInt(10, 60); b = randInt(5, 99 - a);
      op = '+'; ans = a + b;
    } else {
      a = randInt(20, 99); b = randInt(5, a - 1);
      op = '−'; ans = a - b;
    }
    examples.push({ a, b, op, ans, label: `${a} ${op} ${b}` });
  }
  return examples;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function setCard(html) {
  document.getElementById('gameCard').innerHTML = html;
}

// ===========================
// MINI 1: ВЫБОР ОТВЕТА (4 варианта, таймер)
// ===========================
let m1Data = {};

function launchMini1() {
  m1Data = { q: 0, correct: 0, total: 8, timer: null };
  m1Next();
}

function m1Next() {
  if (m1Data.q >= m1Data.total) {
    finishMini(m1Data.correct, m1Data.total, 0);
    return;
  }
  const examples = generateExamples(1, 'mixed');
  const ex = examples[0];
  const right = ex.ans;
  let choices = new Set([right]);
  while (choices.size < 4) {
    const noise = randInt(-8, 8);
    const w = right + (noise === 0 ? 1 : noise);
    if (w > 0 && w !== right) choices.add(w);
  }
  choices = shuffle([...choices]);

  const timeSec = 15;
  setCard(`
    <div class="mini-title">${MINI_CONFIGS[0].name}</div>
    <div class="mini-desc">${MINI_CONFIGS[0].desc}</div>
    <div class="timer-wrap"><div class="timer-bar" id="m1bar" style="width:100%"></div></div>
    <div class="big-example">${ex.label} = ?</div>
    <div class="choices">
      ${choices.map(c => `<button class="choice-btn" onclick="m1choose(this,${c},${right},'${ex.label}')">${c}</button>`).join('')}
    </div>
    <div class="feedback-box" id="m1fb"></div>
    <div style="margin-top:12px;color:var(--gray);font-size:13px">Вопрос ${m1Data.q+1} из ${m1Data.total}</div>
  `);

  let elapsed = 0;
  const bar = document.getElementById('m1bar');
  clearInterval(m1Data.timer);
  m1Data.timer = setInterval(() => {
    elapsed += 100;
    const pct = Math.max(0, 100 - (elapsed / (timeSec * 1000)) * 100);
    bar.style.width = pct + '%';
    if (pct < 30) bar.style.background = 'var(--red)';
    else if (pct < 60) bar.style.background = 'var(--amber)';
    if (elapsed >= timeSec * 1000) {
      clearInterval(m1Data.timer);
      m1Data.q++;
      showFeedback('m1fb', false, `Время вышло! Ответ: ${right}`);
      setTimeout(m1Next, 1400);
    }
  }, 100);
}

function m1choose(btn, chosen, right, label) {
  clearInterval(m1Data.timer);
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);
  const ok = chosen === right;
  btn.classList.add(ok ? 'correct' : 'wrong');
  if (!ok) btns.forEach(b => { if (+b.textContent === right) b.classList.add('correct'); });
  if (ok) { m1Data.correct++; totalScore += 10; playCorrect(); spawnParticles(btn.getBoundingClientRect().left + 40, btn.getBoundingClientRect().top, true); }
  else { playWrong(); document.getElementById('gameCard').classList.add('shake'); setTimeout(()=>document.getElementById('gameCard').classList.remove('shake'),350); }
  showFeedback('m1fb', ok, ok ? `Верно! ${label} = ${right} ✅` : `Ой! Верный ответ: ${right}`);
  m1Data.q++;
  updateScore();
  setTimeout(m1Next, 1400);
}

// ===========================
// MINI 2: ВВОД ОТВЕТА (нумпад)
// ===========================
let m2Data = {};

function launchMini2() {
  m2Data = { q: 0, correct: 0, total: 8, input: '', examples: generateExamples(8, 'mixed') };
  m2Next();
}

function m2Next() {
  if (m2Data.q >= m2Data.total) { finishMini(m2Data.correct, m2Data.total, 0); return; }
  const ex = m2Data.examples[m2Data.q];
  m2Data.input = '';
  m2Data.currentAns = ex.ans;
  m2Data.currentLabel = ex.label;

  setCard(`
    <div class="mini-title">${MINI_CONFIGS[1].name}</div>
    <div class="mini-desc">${MINI_CONFIGS[1].desc}</div>
    <div class="big-example">${ex.label} = ?</div>
    <div class="answer-display" id="m2disp">_</div>
    <div class="numpad">
      ${[1,2,3,'⌫',4,5,6,'',7,8,9,''].map(k=>`<button class="numpad-btn${k==='⌫'?' del':''}" onclick="m2press('${k}')">${k}</button>`).join('')}
      <button class="numpad-btn" onclick="m2press('0')">0</button>
      <button class="numpad-btn ok-btn" onclick="m2ok()">✓ ОК</button>
    </div>
    <div class="feedback-box" id="m2fb"></div>
    <div style="margin-top:12px;color:var(--gray);font-size:13px">Вопрос ${m2Data.q+1} из ${m2Data.total}</div>
  `);
}

function m2press(k) {
  playClick();
  if (k === '⌫') { m2Data.input = m2Data.input.slice(0,-1); }
  else if (k !== '' && m2Data.input.length < 3) { m2Data.input += k; }
  document.getElementById('m2disp').textContent = m2Data.input || '_';
}

function m2ok() {
  if (!m2Data.input) return;
  const val = parseInt(m2Data.input);
  const ok = val === m2Data.currentAns;
  if (ok) { m2Data.correct++; totalScore += 12; playCorrect(); spawnParticles(window.innerWidth/2, window.innerHeight/2, true); }
  else { playWrong(); }
  showFeedback('m2fb', ok, ok ? `Верно! ${m2Data.currentLabel} = ${m2Data.currentAns} ✅` : `Нет! ${m2Data.currentLabel} = ${m2Data.currentAns}`);
  m2Data.q++;
  updateScore();
  const btns = document.querySelectorAll('.numpad-btn');
  btns.forEach(b => b.disabled = true);
  setTimeout(m2Next, 1400);
}

// ===========================
// MINI 3: СОРТИРОВКА (drag & drop)
// ===========================
let m3Data = {};

function launchMini3() {
  const answers = [randInt(15,45), randInt(46,85)].sort((a,b)=>a-b);
  const examples = [];
  answers.forEach(ans => {
    // generate 2 examples per planet
    for (let j = 0; j < 2; j++) {
      let a, b, op;
      if (Math.random() < 0.5) {
        b = randInt(2, Math.min(ans-1, 30));
        a = ans - b;
        op = '+';
      } else {
        b = randInt(2, 20);
        a = ans + b;
        op = '−';
      }
      examples.push({ label: `${a} ${op} ${b}`, ans });
    }
  });
  shuffle(examples);
  m3Data = { answers, examples, correct: 0, total: examples.length, placed: {}, hints: 0 };
  renderM3();
}

function renderM3() {
  const { answers, examples } = m3Data;
  const draggables = examples.filter(e => !m3Data.placed[e.label]);
  setCard(`
    <div class="mini-title">${MINI_CONFIGS[2].name}</div>
    <div class="mini-desc">${MINI_CONFIGS[2].desc}</div>
    <div class="draggable-area" id="m3pool">
      ${draggables.map(e=>`<div class="example-chip" draggable="true" data-ans="${e.ans}" data-label="${e.label}" id="chip_${e.label.replace(/\s/g,'_')}" ondragstart="m3dragStart(event)">${e.label}</div>`).join('')}
    </div>
    <div class="sort-grid">
      ${answers.map(ans=>`
        <div class="sort-planet" id="planet_${ans}" ondragover="event.preventDefault();this.classList.add('over')" ondragleave="this.classList.remove('over')" ondrop="m3drop(event,${ans})">
          <span class="planet-answer">= ${ans}</span>
          <div id="slotContent_${ans}"></div>
        </div>`).join('')}
    </div>
    <div class="feedback-box" id="m3fb"></div>
    <div style="margin-top:8px;color:var(--gray);font-size:13px">Размещено: <span id="m3placed">0</span> из ${m3Data.total}</div>
  `);
  // touch support
  setupTouchDrag();
}

let dragItem = null;
function m3dragStart(e) {
  dragItem = e.target;
  e.dataTransfer.setData('text/plain', e.target.dataset.label + '|' + e.target.dataset.ans);
}

function m3drop(e, planetAns) {
  e.preventDefault();
  const planet = document.getElementById('planet_' + planetAns);
  planet.classList.remove('over');
  const data = e.dataTransfer.getData('text/plain').split('|');
  const label = data[0];
  const chipAns = parseInt(data[1]);
  m3placeChip(label, chipAns, planetAns);
}

function m3placeChip(label, chipAns, planetAns) {
  const ok = chipAns === planetAns;
  const chipId = 'chip_' + label.replace(/\s/g,'_');
  const chip = document.getElementById(chipId);
  if (chip) chip.remove();
  const planet = document.getElementById('planet_' + planetAns);
  if (ok) {
    planet.classList.add('correct');
    playCorrect();
    m3Data.correct++;
    m3Data.placed[label] = true;
    totalScore += 15;
    spawnParticles(planet.getBoundingClientRect().left + 60, planet.getBoundingClientRect().top + 30, true);
  } else {
    planet.classList.add('wrong');
    playWrong();
    m3Data.hints++;
    setTimeout(() => planet.classList.remove('wrong'), 600);
    // return chip to pool
    const pool = document.getElementById('m3pool');
    if (pool) {
      const c = document.createElement('div');
      c.className = 'example-chip';
      c.draggable = true;
      c.dataset.ans = chipAns;
      c.dataset.label = label;
      c.id = 'chip_' + label.replace(/\s/g,'_');
      c.textContent = label;
      c.addEventListener('dragstart', m3dragStart);
      pool.appendChild(c);
      setupTouchDrag();
    }
  }
  const slotContent = document.getElementById('slotContent_' + planetAns);
  if (ok && slotContent) {
    const chip = document.createElement('div');
    chip.className = 'example-chip';
    chip.style.cursor = 'default';
    chip.style.background = 'rgba(78,203,113,0.2)';
    chip.textContent = label;
    slotContent.appendChild(chip);
  }
  document.getElementById('m3placed').textContent = Object.keys(m3Data.placed).length;
  updateScore();
  if (Object.keys(m3Data.placed).length >= m3Data.total) {
    setTimeout(() => finishMini(m3Data.correct, m3Data.total, m3Data.hints), 700);
  }
}

function setupTouchDrag() {
  const chips = document.querySelectorAll('.example-chip');
  chips.forEach(chip => {
    chip.addEventListener('touchstart', touchStart, {passive:false});
    chip.addEventListener('touchmove', touchMove, {passive:false});
    chip.addEventListener('touchend', touchEnd);
  });
}

let touchChip = null, touchClone = null;
function touchStart(e) {
  e.preventDefault();
  touchChip = e.currentTarget;
  touchClone = touchChip.cloneNode(true);
  touchClone.style.position = 'fixed';
  touchClone.style.pointerEvents = 'none';
  touchClone.style.zIndex = 9999;
  touchClone.style.opacity = '0.85';
  touchClone.style.transform = 'scale(1.1)';
  document.body.appendChild(touchClone);
}
function touchMove(e) {
  e.preventDefault();
  if (!touchClone) return;
  const t = e.touches[0];
  touchClone.style.left = (t.clientX - 40) + 'px';
  touchClone.style.top = (t.clientY - 20) + 'px';
}
function touchEnd(e) {
  if (!touchClone || !touchChip) return;
  touchClone.remove();
  const t = e.changedTouches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const planet = el ? el.closest('.sort-planet') : null;
  if (planet) {
    const planetAns = parseInt(planet.id.replace('planet_', ''));
    m3placeChip(touchChip.dataset.label, parseInt(touchChip.dataset.ans), planetAns);
  }
  touchClone = null; touchChip = null;
}

// ===========================
// MINI 4: ЗНАК + или −
// ===========================
let m4Data = {};

function launchMini4() {
  m4Data = { q: 0, correct: 0, total: 8, hints: 0, tries: 0, hintsShown: 0 };
  m4Data.problems = [];
  for (let i = 0; i < 8; i++) {
    const useAdd = Math.random() < 0.5;
    if (useAdd) {
      const a = randInt(10, 60), b = randInt(5, 30);
      m4Data.problems.push({ a, b, op: '+', ans: a + b });
    } else {
      const a = randInt(30, 90), b = randInt(5, a - 5);
      m4Data.problems.push({ a, b, op: '−', ans: a - b });
    }
  }
  m4Next();
}

function m4Next() {
  if (m4Data.q >= m4Data.total) { finishMini(m4Data.correct, m4Data.total, m4Data.hintsShown); return; }
  const p = m4Data.problems[m4Data.q];
  m4Data.tries = 0;
  m4Data.currentProblem = p;
  setCard(`
    <div class="mini-title">${MINI_CONFIGS[3].name}</div>
    <div class="mini-desc">${MINI_CONFIGS[3].desc}</div>
    <div class="sign-row">
      <span class="sign-num">${p.a}</span>
      <div class="sign-slot" id="signSlot">?</div>
      <span class="sign-num">${p.b}</span>
      <span class="sign-equals">=</span>
      <span class="sign-result">${p.ans}</span>
    </div>
    <div style="display:flex;gap:20px;justify-content:center;margin:16px 0;">
      <button class="btn btn-primary" style="font-family:'Orbitron',monospace;font-size:clamp(24px,5vw,40px);padding:16px 44px;min-width:100px;" onclick="m4choose('+')">+</button>
      <button class="btn btn-blue"    style="font-family:'Orbitron',monospace;font-size:clamp(24px,5vw,40px);padding:16px 44px;min-width:100px;" onclick="m4choose('−')">−</button>
    </div>
    <div class="feedback-box" id="m4fb"></div>
    <div class="hint-box" id="m4hint"></div>
    <div style="margin-top:12px;color:var(--gray);font-size:13px">Вопрос ${m4Data.q+1} из ${m4Data.total} • Попытки: <span id="m4tries">0</span>/3</div>
  `);
}

function m4choose(chosen) {
  const slot = document.getElementById('signSlot');
  const p = m4Data.currentProblem;
  const ok = (chosen === '+' && p.op === '+') || (chosen === '−' && p.op === '−');
  m4Data.tries++;
  slot.textContent = chosen;
  document.getElementById('m4tries').textContent = m4Data.tries;

  if (ok) {
    slot.classList.add('correct');
    // disable both sign buttons
    document.querySelectorAll('#game-screen .btn').forEach(b => b.disabled = true);
    playCorrect();
    m4Data.correct++;
    totalScore += 12;
    showFeedback('m4fb', true, `Верно! ${p.a} ${p.op} ${p.b} = ${p.ans} ✅`);
    updateScore();
    spawnParticles(slot.getBoundingClientRect().left + 35, slot.getBoundingClientRect().top + 35, true);
    m4Data.q++;
    setTimeout(m4Next, 1400);
  } else {
    slot.classList.add('wrong');
    setTimeout(() => { slot.classList.remove('wrong'); slot.textContent = '?'; }, 400);
    playWrong();
    showFeedback('m4fb', false, m4Data.tries === 1 ? 'Не угадал! Попробуй ещё раз!' : 'Снова не то... посмотри подсказку!');
    if (m4Data.tries >= 2) {
      const hint = document.getElementById('m4hint');
      hint.textContent = `💡 Подсказка: ${p.a} ${p.op} ${p.b} = ${p.ans}. Значит нужен знак «${p.op}»`;
      hint.classList.add('show');
      m4Data.hintsShown++;
      if (m4Data.tries >= 3) {
        document.querySelectorAll('#game-screen .btn').forEach(b => b.disabled = true);
        m4Data.q++;
        setTimeout(m4Next, 2000);
      }
    }
  }
}

// ===========================
// MINI 5: НАЙДИ ОШИБКУ
// ===========================
let m5Data = {};

function launchMini5() {
  m5Data = { q: 0, correct: 0, total: 6, hints: 0 };
  m5Data.problems = [];
  for (let i = 0; i < 6; i++) {
    const a = randInt(20, 80), b = randInt(5, Math.min(a - 1, 30));
    const op = Math.random() < 0.5 ? '+' : '−';
    const correctAns = op === '+' ? a + b : a - b;

    // errorType: 1 = wrong calculation shown, 2 = wrong final answer
    const errorType = Math.random() < 0.5 ? 1 : 2;

    // Make a clearly wrong number (off by 2–9, never 0)
    const offset = randInt(2, 9) * (Math.random() < 0.5 ? 1 : -1);
    const wrongAns = correctAns + offset;

    const lines = [];
    // Line 0: example statement — always correct
    lines.push({ text: `${a} ${op} ${b} = ?`, isError: false, idx: 0 });

    if (errorType === 1) {
      // Line 1: wrong calculation
      lines.push({ text: `Считаю: ${a} ${op} ${b} = ${wrongAns}`, isError: true, idx: 1 });
      // Line 2: final answer matches (wrong) calculation — consistent but wrong
      lines.push({ text: `Ответ: ${wrongAns}`, isError: false, idx: 2 });
    } else {
      // Line 1: correct calculation
      lines.push({ text: `Считаю: ${a} ${op} ${b} = ${correctAns}`, isError: false, idx: 1 });
      // Line 2: wrong final answer (different from calculation)
      lines.push({ text: `Ответ: ${wrongAns}`, isError: true, idx: 2 });
    }

    m5Data.problems.push({ a, b, op, ans: correctAns, lines, errorIdx: errorType });
  }
  m5Next();
}

function m5Next() {
  if (m5Data.q >= m5Data.total) { finishMini(m5Data.correct, m5Data.total, m5Data.hints); return; }
  const p = m5Data.problems[m5Data.q];
  setCard(`
    <div class="mini-title">${MINI_CONFIGS[4].name}</div>
    <div class="mini-desc">${MINI_CONFIGS[4].desc}</div>
    <div class="robot-solution">
      ${p.lines.map((l,i) => `<div class="robot-line" id="rline${i}" onclick="m5click(${i},${l.isError?1:0})">
        🤖 ${l.text}
      </div>`).join('')}
    </div>
    <div class="feedback-box" id="m5fb"></div>
    <div style="margin-top:8px;color:var(--gray);font-size:13px">Вопрос ${m5Data.q+1} из ${m5Data.total}</div>
  `);
}

function m5click(lineIdx, isError) {
  const lines = document.querySelectorAll('.robot-line');
  lines.forEach(l => l.onclick = null);
  const p = m5Data.problems[m5Data.q];
  if (isError) {
    lines[lineIdx].classList.add('correct-error');
    playCorrect();
    m5Data.correct++;
    totalScore += 15;
    spawnParticles(window.innerWidth/2, 200, true);
    showFeedback('m5fb', true, `✅ Нашёл ошибку! Правильно: ${p.a} ${p.op} ${p.b} = ${p.ans}`);
    updateScore();
  } else {
    lines[lineIdx].classList.add('wrong-error');
    playWrong();
    m5Data.hints++;
    setTimeout(() => {
      lines[p.errorIdx].classList.add('correct-error');
    }, 400);
    showFeedback('m5fb', false, `Ошибка в другой строке! ${p.a} ${p.op} ${p.b} = ${p.ans}`);
  }
  m5Data.q++;
  setTimeout(m5Next, 1900);
}

// ===========================
// MINI 6: ФИНАЛЬНЫЙ СПРИНТ
// ===========================
let m6Data = {};

function launchMini6() {
  m6Data = { q: 0, correct: 0, total: 10, input: '', examples: generateExamples(10, 'mixed') };
  m6Next();
}

function m6Next() {
  if (m6Data.q >= m6Data.total) { finishMini(m6Data.correct, m6Data.total, 0); return; }
  const ex = m6Data.examples[m6Data.q];
  m6Data.input = '';
  m6Data.currentAns = ex.ans;
  m6Data.currentLabel = ex.label;

  const dots = Array.from({length: m6Data.total}, (_,i) => {
    let cls = 'pdot';
    if (i < m6Data.q) cls += m6Data.results[i] ? ' ok' : ' fail';
    else if (i === m6Data.q) cls += ' cur';
    return `<div class="${cls}"></div>`;
  }).join('');

  setCard(`
    <div class="mini-title">${MINI_CONFIGS[5].name}</div>
    <div class="mini-desc">${MINI_CONFIGS[5].desc}</div>
    <div class="progress-dots">${dots}</div>
    <div class="big-example">${ex.label} = ?</div>
    <div class="answer-display" id="m6disp">_</div>
    <div class="numpad">
      ${[1,2,3,'⌫',4,5,6,'',7,8,9,''].map(k=>`<button class="numpad-btn${k==='⌫'?' del':''}" onclick="m6press('${k}')">${k}</button>`).join('')}
      <button class="numpad-btn" onclick="m6press('0')">0</button>
      <button class="numpad-btn ok-btn" onclick="m6ok()">✓ ОК</button>
    </div>
    <div class="feedback-box" id="m6fb"></div>
  `);
}

if (!m6Data.results) m6Data.results = [];

function m6press(k) {
  playClick();
  if (k === '⌫') m6Data.input = m6Data.input.slice(0,-1);
  else if (k !== '' && m6Data.input.length < 3) m6Data.input += k;
  document.getElementById('m6disp').textContent = m6Data.input || '_';
}

function m6ok() {
  if (!m6Data.input) return;
  if (!m6Data.results) m6Data.results = [];
  const val = parseInt(m6Data.input);
  const ok = val === m6Data.currentAns;
  if (ok) { m6Data.correct++; totalScore += 20; playCorrect(); spawnParticles(window.innerWidth/2, window.innerHeight/2, true); }
  else { playWrong(); }
  m6Data.results.push(ok);
  showFeedback('m6fb', ok, ok ? `✅ ${m6Data.currentLabel} = ${m6Data.currentAns}` : `❌ Ответ: ${m6Data.currentAns}`);
  m6Data.q++;
  updateScore();
  const btns = document.querySelectorAll('.numpad-btn');
  btns.forEach(b => b.disabled = true);
  setTimeout(m6Next, 1200);
}

// ===========================
// FEEDBACK HELPER
// ===========================
function showFeedback(id, ok, text) {
  const fb = document.getElementById(id);
  if (!fb) return;
  fb.className = 'feedback-box show ' + (ok ? 'good' : 'bad');
  fb.textContent = text;
}

// ===========================
// REPORT
// ===========================
function showReport() {
  document.getElementById('hud').style.display = 'none';
  document.getElementById('galaxy-map').style.display = 'none';
  showScreen('report-screen');

  const totalCorrect = miniStats.reduce((s,m) => s + m.correct, 0);
  const totalQ = miniStats.reduce((s,m) => s + m.total, 0);
  const pct = Math.round((totalCorrect / totalQ) * 100);

  let stars = '';
  for (let i = 0; i < 6; i++) {
    const mp = Math.round((miniStats[i].correct / miniStats[i].total) * 100);
    stars += mp >= 80 ? '⭐' : mp >= 50 ? '🌙' : '💫';
  }

  const grade = pct >= 85 ? { text: 'Отлично! 🏆', color: 'green' }
    : pct >= 65 ? { text: 'Хорошо! 👍', color: 'yellow' }
    : { text: 'Нужно повторить 📚', color: 'red' };

  let rows = miniStats.map((m,i) => {
    const mp = Math.round((m.correct/m.total)*100);
    const col = mp >= 80 ? 'green' : mp >= 50 ? 'yellow' : 'red';
    return `<div class="report-row">
      <span class="name">${MINI_CONFIGS[i].name}</span>
      <span class="val ${col}">${m.correct}/${m.total} (${mp}%)</span>
    </div>
    <div class="report-row" style="background:transparent;padding-top:0">
      <span style="color:var(--gray);font-size:12px">⏱ ${m.time} сек &nbsp;|&nbsp; 💡 подсказок: ${m.hints}</span>
    </div>`;
  }).join('');

  document.getElementById('reportContent').innerHTML = `
    <div style="text-align:center;font-size:28px;margin-bottom:10px">${stars}</div>
    ${rows}
    <div class="report-total">
      <div style="font-size:clamp(22px,4vw,32px);color:var(--amber);font-family:'Orbitron',monospace">${totalScore} очков</div>
      <div style="color:var(--white);margin:6px 0">${totalCorrect} из ${totalQ} правильно (${pct}%)</div>
      <div style="color:var(--${grade.color})">${grade.text}</div>
      <div style="color:var(--gray);font-size:13px;margin-top:8px">
        ${pct >= 85 ? 'Ученик отлично владеет устным счётом!' :
          pct >= 65 ? 'Рекомендуется повторить смешанные примеры.' :
          'Рекомендуется дополнительная практика сложения и вычитания.'}
      </div>
    </div>
    <div style="text-align:center;margin-top:20px">
      <button class="btn btn-primary" onclick="location.reload()">🔄 Играть снова</button>
    </div>
  `;

  spawnParticles(window.innerWidth/2, window.innerHeight/2, pct >= 65);
  if (pct >= 65) { playCorrect(); setTimeout(()=>playCorrect(),300); }
}
</script>
